<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>July 4 Countdown — Fireworks</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  assets/css/base.css
  assets/css/fireworks.css
</head>
<body>
  <div class="hero">
    <canvas id="sky" aria-hidden="true"></canvas>
    <div class="overlay container">
      <h1>July 4, 2026 — 9:00 PM</h1>
      <div id="cd" class="count glass" aria-live="polite">
        <div class="block"><span class="num" data-part="days">0</span><span class="label">Days</span></div>
        <div class="block"><span class="num" data-part="hours">00</span><span class="label">Hours</span></div>
        <div class="block"><span class="num" data-part="minutes">00</span><span class="label">Minutes</span></div>
        <div class="block"><span class="num" data-part="seconds">00</span><span class="label">Seconds</span></div>
        <div class="label" data-part="done" hidden>Happy 4th of July! 🎆</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { startCountdown } from './assets/js/countdown.js';
    import { startFireworks } from './assets/js/fireworks.js';

    const root = document.getElementById('cd');
    startCountdown(root, (ms, parts) => {
      // Trigger more frequent bursts as we approach 0
      const intensity = Math.max(0.2, 1 - (ms / (1000 * 60 * 60 * 24 * 7))); // over last 7 days
      window.fireworks && window.fireworks.setIntensity(intensity);
      document.title = `🎆 ${parts.d}d ${String(parts.h).padStart(2,'0')}:${String(parts.m).padStart(2,'0')}:${String(parts.sec).padStart(2,'0')} — July 4`;
    });

    startFireworks(document.getElementById('sky'));
  </script>
</body>
</html>
