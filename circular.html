<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>July 4 Countdown — Circular</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  assets/css/base.css
  assets/css/circular.css
</head>
<body>
  <div class="container">
    <h1>Circular Countdown — July 4, 2026 @ 9:00 PM</h1>
    <p class="sub">Sarasota-inspired colors. Mobile-friendly. Accessible.</p>

    <!-- SVG ring (progress of total time remaining toward event) -->
    <div class="ring-wrap">
      <svg class="ring" viewBox="0 0 120 120" aria-hidden="true">
        <circle class="bg" cx="60" cy="60" r="54"></circle>
        <circle class="fg" cx="60" cy="60" r="54"></circle>
      </svg>
      <div class="ring-center">
        <div class="num" id="ring-days">0</div>
        <div class="label">Days</div>
      </div>
    </div>

    <!-- Numeric blocks -->
    <div id="cd" class="count" aria-live="polite">
      <div class="block"><span class="num" data-part="days">0</span><span class="label">Days</span></div>
      <div class="block"><span class="num" data-part="hours">00</span><span class="label">Hours</span></div>
      <div class="block"><span class="num" data-part="minutes">00</span><span class="label">Minutes</span></div>
      <div class="block"><span class="num" data-part="seconds">00</span><span class="label">Seconds</span></div>
      <div class="label" data-part="done" hidden>Happy 4th of July! 🎆</div>
    </div>
  </div>

  <script type="module">
    import { startCountdown } from './assets/js/countdown.js';

    const root = document.getElementById('cd');
    const fg = document.querySelector('.fg');
    const ringDays = document.getElementById('ring-days');
    const CIRC = 2 * Math.PI * 54; // circumference

    fg.style.strokeDasharray = `${CIRC} ${CIRC}`;
    fg.style.strokeDashoffset = `${CIRC}`;

    // Precompute total seconds to show relative progress (optional)
    const target = new Date("2026-07-04T21:00:00-04:00").getTime();
    const totalMs = target - Date.now(); // initial total at load

    startCountdown(root, (ms, parts) => {
      const progress = Math.max(ms, 0) / Math.max(totalMs, 1);
      fg.style.strokeDashoffset = String(CIRC * progress);
      ringDays.textContent = String(parts.d);
      document.title = `⏳ ${parts.d}d ${String(parts.h).padStart(2,'0')}:${String(parts.m).padStart(2,'0')}:${String(parts.sec).padStart(2,'0')} — July 4`;
    });
  </script>
</body>
</html>
