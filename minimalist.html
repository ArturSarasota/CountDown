<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Countdown to America's 250th Anniversary</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- ✅ Correct stylesheet links (no plain text) -->
  ./assets/css/base.css
  ./assets/css/minimalist.css
</head>
<body>

  <!-- ✅ Proper skip link (hidden until focused) -->
  #mainSkip to countdown</a>

  <!-- Optional fireworks canvas (decorative) -->
  <canvas id="sky" aria-hidden="true"></canvas>

  <!-- Dark navy frame with centered content -->
  <main id="main" class="frame" role="main" aria-labelledby="title">
    <div class="container center">
      <h1 id="title">Countdown to America's 250th Anniversary</h1>
      <p class="sub">July 4, 2026 · 9:00 PM (EDT)</p>

      <!-- Motion control (optional, keep for ADA/WCAG 2.2.2) -->
      <div class="controls" role="group" aria-label="Animation controls">
        <button id="toggleMotion" class="btn" aria-pressed="false">Pause animation</button>
      </div>

      <!-- ✅ Timer: inline layout (not stacked) -->
      <div id="cd" class="timer-line" aria-live="polite"
           aria-label="Countdown in days, hours, minutes, and seconds">
        <span class="item">
          <span class="num" data-part="days">0</span>
          <span class="label">Days</span>
        </span>
        <span class="sep">|</span>
        <span class="item">
          <span class="num" data-part="hours">00</span>
          <span class="label">Hours</span>
        </span>
        <span class="sep">|</span>
        <span class="item">
          <span class="num" data-part="minutes">00</span>
          <span class="label">Minutes</span>
        </span>
        <span class="sep">|</span>
        <span class="item">
          <span class="num" data-part="seconds">00</span>
          <span class="label">Seconds</span>
        </span>
        <div class="done" data-part="done" hidden>Happy 4th of July! 🎆</div>
      </div>
    </div>
  </main>

  <!-- Countdown + fireworks (optional) -->
  <script type="module">
    import { startCountdown } from './assets/js/countdown.js';
    import { startFireworks } from './assets/js/fireworks.js';

    // Start fireworks gently
    const sky = document.getElementById('sky');
    let fw = startFireworks(sky);
    let motionPaused = false;

    // Respect prefers-reduced-motion
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const toggleBtn = document.getElementById('toggleMotion');
    if (reduceMotion) {
      fw.setIntensity(0);
      motionPaused = true;
      toggleBtn.setAttribute('aria-pressed', 'true');
      toggleBtn.textContent = 'Resume animation';
    }

    toggleBtn.addEventListener('click', () => {
      motionPaused = !motionPaused;
      fw.setIntensity(motionPaused ? 0 : 0.35);
      toggleBtn.setAttribute('aria-pressed', motionPaused ? 'true' : 'false');
      toggleBtn.textContent = motionPaused ? 'Resume animation' : 'Pause animation';
    });

    // Countdown
    const root = document.getElementById('cd');
    startCountdown(root, (ms, p) => {
      document.title =
        `🇺🇸 ${p.d}d ${String(p.h).padStart(2,'0')}:${String(p.m).padStart(2,'0')}:${String(p.sec).padStart(2,'0')} — America’s 250th`;
    });
  </script>
</body>
</html>
